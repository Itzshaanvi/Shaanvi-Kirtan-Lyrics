<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirtan Lyrics</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  /* Glass-style inputs, buttons, selects, textareas */
button, select, input, textarea {
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(12px);
  border: none;
  border-radius: 16px;
  padding: 10px 16px;
  font-family: 'Patrick Hand', cursive;
  font-size: 16px;
  color: #000;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  transition: all 0.2s ease-in-out;
}

button:hover, select:hover, input:hover, textarea:hover {
  background: rgba(255, 255, 255, 0.35);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
}

/* Card boxes */
.box {
  background: rgba(255, 255, 255, 0.18);
  backdrop-filter: blur(16px);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
  transition: all 0.2s ease-in-out;
}

.box:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}

/* Edit/Like/Delete buttons (black outline) */
.boxButtons button {
  background: rgba(255,255,255,0.18);
  border: 1px solid #000;
  border-radius: 12px;
  padding: 6px 10px;
  cursor: pointer;
  font-family: 'Patrick Hand', cursive;
  transition: all 0.2s;
}

.boxButtons button:hover {
  background: rgba(255,255,255,0.35);
  transform: translateY(-1px);
}
  body { font-family:'Patrick Hand', cursive; background:#fff; color:#000; margin:0; padding:0; }
  header{ display:flex; justify-content:space-between; align-items:center; padding:20px; flex-wrap:wrap; }
  header h1{ margin:0; font-size:36px; }
  nav{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

  select, button, input, textarea{
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(10px);
    border:none;
    border-radius:14px;
    padding:10px 14px;
    font-family:'Patrick Hand', cursive;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
  }
  button:hover, select:hover, input:hover, textarea:hover{ background:rgba(255,255,255,0.35); transform:scale(1.03); }

  #line { height:2px; background:#000; margin:0 20px; }

  #controls{ display:flex; gap:10px; padding:10px 20px; flex-wrap:wrap; }

  #content{ max-width:900px; margin:20px auto; padding:10px; }

  .box{
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(12px);
    border-radius:16px;
    padding:16px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
  }
  .boxLeft{ display:flex; flex-direction:column; }
  .boxTitle{ font-size:20px; font-weight:bold; }
  .boxSnippet{ color:gray; margin-top:4px; }
  .boxButtons{ display:flex; gap:6px; }

  .editForm{ display:flex; flex-direction:column; gap:10px; max-width:500px; margin:auto; }
  .dropdownRow{ display:flex; gap:10px; }
</style>
</head>
<body>

<header>
<h1>Lyrics</h1>
<nav>
  <select id="typeSelect">
    <option value="">Select Type</option>
    <option value="kirtan">Kirtan</option>
    <option value="pooja">Pooja</option>
    <option value="mantras">Mantras</option>
    <option value="aartis">Aartis</option>
    <option value="songs">Songs</option>
  </select>

  <select id="subSelect" style="display:none;"></select>

  <button id="addLyricsBtn">+ Add Lyrics</button>
</nav>
</header>

<div id="line"></div>

<div id="controls">
  <input id="searchInput" placeholder="Search lyrics..." style="flex:1;">
  <button id="sortBtn">Sort A → Z</button>
  <button id="increaseFont">A+</button>
  <button id="decreaseFont">A-</button>
</div>

<h2 style="margin-left:20px;">Recently Opened</h2>
<div id="recentlyOpened"></div>

<h2 style="margin-left:20px;">Recently Added</h2>
<div id="content"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUOUXEs3_-OKUbeSM8inhP3pXwvjKkSNk",
  authDomain: "kirtan-lyrics-57c73.firebaseapp.com",
  projectId: "kirtan-lyrics-57c73",
  storageBucket: "kirtan-lyrics-57c73.firebasestorage.app",
  messagingSenderId: "183945714537",
  appId: "1:183945714537:web:a7b655e671b710d303fbf8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* STATE */
let currentType="", currentSub="", isAZ=true, fontSize=20;
let recentlyOpenedArr = JSON.parse(localStorage.getItem("recentlyOpened") || "[]");

/* ELEMENTS */
const typeSelect=document.getElementById("typeSelect");
const subSelect=document.getElementById("subSelect");
const content=document.getElementById("content");
const addBtn=document.getElementById("addLyricsBtn");
const searchInput=document.getElementById("searchInput");
const sortBtn=document.getElementById("sortBtn");
const increaseFont=document.getElementById("increaseFont");
const decreaseFont=document.getElementById("decreaseFont");
const recentlyOpenedDiv=document.getElementById("recentlyOpened");

/* UTILITY */
function renderSubSelect(type, el){
  el.innerHTML="";
  let arr=[];
  if(type==="kirtan") arr=["Krishna","Ram","Hanuman","Ganesh","Shiva","Durga","Marni","Other"];
  if(type==="pooja") arr=["Ramayan","Bhagvat","Navratri","Shivratri","Janamashtami","Navmi","Ganesh Chathurthi"];
  if(type==="songs") arr=["Filmy Songs","Ghazals","Qawalis","Other"];
  arr.forEach(v=>{ let o=document.createElement("option"); o.value=v; o.textContent=v; el.appendChild(o); });
}

/* FIRESTORE FUNCTIONS */
const lyricsCol = collection(db,"lyrics");
function addLyricsFirestore(obj){ addDoc(lyricsCol,obj); }
function updateLyricsFirestore(id,obj){ updateDoc(doc(db,"lyrics",id),obj); }
function deleteLyricsFirestore(id){ deleteDoc(doc(db,"lyrics",id)); }

/* RENDER LYRICS */
function renderLyrics(list,container){
  container.innerHTML="";
  list.forEach(item=>{
    let box=document.createElement("div"); box.className="box";
    let left=document.createElement("div"); left.className="boxLeft";
    let title=document.createElement("div"); title.className="boxTitle"; title.style.fontSize=fontSize+"px"; title.textContent=item.title;
    let snippet=document.createElement("div"); snippet.className="boxSnippet"; snippet.textContent=item.lyrics.split("\n")[0]+"...";
    left.appendChild(title); left.appendChild(snippet);

    let buttons=document.createElement("div"); buttons.className="boxButtons";
    let like=document.createElement("button"); like.textContent="♡"; like.onclick=()=>{ updateLyricsFirestore(item.id,{likes:(item.likes||0)+1}); };
    let edit=document.createElement("button"); edit.textContent="Edit"; edit.onclick=()=>{ openEditForm(item); };
    let del=document.createElement("button"); del.textContent="Delete"; del.onclick=()=>{ deleteLyricsFirestore(item.id); };
    buttons.append(like,edit,del);

    box.appendChild(left); box.appendChild(buttons);

    box.onclick=function(e){
      if(!["BUTTON"].includes(e.target.tagName)){
        openFullLyrics(item);
      }
    }

    container.appendChild(box);
  });
}

/* OPEN FULL LYRICS */
function openFullLyrics(item){
  recentlyOpenedArr = [item,...recentlyOpenedArr.filter(i=>i.id!==item.id)].slice(0,10);
  localStorage.setItem("recentlyOpened",JSON.stringify(recentlyOpenedArr));
  renderRecentlyOpened();

  content.innerHTML=`
  <div class="editForm">
    <h2>${item.title}</h2>
    <textarea style="height:300px;" readonly>${item.lyrics}</textarea>
    <button id="incFont">A+</button>
    <button id="decFont">A-</button>
  </div>
  `;
  document.getElementById("incFont").onclick=()=>{ fontSize+=2; openFullLyrics(item); };
  document.getElementById("decFont").onclick=()=>{ fontSize=Math.max(12,fontSize-2); openFullLyrics(item); };
}

/* RENDER RECENTLY OPENED */
function renderRecentlyOpened(){
  renderLyrics(recentlyOpenedArr,recentlyOpenedDiv);
}

/* ADD/EDIT FORM */
function openAddForm(){
  content.innerHTML=`
  <div class="editForm">
    <h2>Add Lyrics</h2>
    <div class="dropdownRow">
      <select id="editType">
        <option value="kirtan">Kirtan</option>
        <option value="pooja">Pooja</option>
        <option value="mantras">Mantras</option>
        <option value="aartis">Aartis</option>
        <option value="songs">Songs</option>
      </select>
      <select id="editSub"></select>
    </div>
    <input id="editTitle" placeholder="Title">
    <textarea id="editLyrics" placeholder="Lyrics"></textarea>
    <button id="saveBtn">Save</button>
  </div>
  `;
  const editType=document.getElementById("editType");
  const editSub=document.getElementById("editSub");
  renderSubSelect(editType.value,editSub);
  editType.onchange=()=>renderSubSelect(editType.value,editSub);

  document.getElementById("saveBtn").onclick=()=>{
    const obj={
      type: editType.value,
      sub: editSub.value,
      title: document.getElementById("editTitle").value,
      lyrics: document.getElementById("editLyrics").value,
      likes:0,
      created: new Date()
    };
    addLyricsFirestore(obj);
    content.innerHTML="";
  }
}

/* EDIT FORM */
function openEditForm(item){
  content.innerHTML=`
  <div class="editForm">
    <h2>Edit Lyrics</h2>
    <input id="editTitle" value="${item.title}">
    <textarea id="editLyrics">${item.lyrics}</textarea>
    <button id="saveEdit">Save Changes</button>
  </div>
  `;
  document.getElementById("saveEdit").onclick=()=>{
    updateLyricsFirestore(item.id,{
      title: document.getElementById("editTitle").value,
      lyrics: document.getElementById("editLyrics").value
    });
    content.innerHTML="";
  }
}

/* EVENTS */
addBtn.onclick=openAddForm;
typeSelect.onchange=()=>{ 
  currentType=typeSelect.value; 
  if(["kirtan","pooja","songs"].includes(currentType)){
    subSelect.style.display="inline-block"; renderSubSelect(currentType,subSelect); currentSub=subSelect.value;
  }else subSelect.style.display="none";
};
subSelect.onchange=()=>{ currentSub=subSelect.value; };
searchInput.oninput=()=>{ renderFiltered(); };
sortBtn.onclick=()=>{ isAZ=!isAZ; sortBtn.textContent=isAZ?"Sort A → Z":"Sort Z → A"; renderFiltered(); };
increaseFont.onclick=()=>{ fontSize+=2; renderFiltered(); };
decreaseFont.onclick=()=>{ fontSize=Math.max(12,fontSize-2); renderFiltered(); };

/* FETCH AND LISTEN */
onSnapshot(query(lyricsCol,orderBy("created","desc")),snapshot=>{
  const arr=snapshot.docs.map(doc=>({id:doc.id,...doc.data()}));
  window.allLyrics=arr;
  renderFiltered();
});

function renderFiltered(){
  let list = window.allLyrics || [];
  if(currentType) list=list.filter(i=>i.type===currentType);
  if(currentSub) list=list.filter(i=>i.sub===currentSub);
  const q = searchInput.value.toLowerCase();
  list=list.filter(i=>i.title.toLowerCase().includes(q)||i.lyrics.toLowerCase().includes(q));
  list.sort((a,b)=>isAZ?a.title.localeCompare(b.title):b.title.localeCompare(a.title));
  renderLyrics(list,content);
}

/* INITIAL RENDER */
renderRecentlyOpened();

</script>
</body>
</html>
