<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirtan Lyrics</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:cursive;
background:#f5f5f5;
}

header{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:space-between;
align-items:center;
padding:20px;
}

button,select,input{
border-radius:12px;
border:1px solid rgba(255,255,255,0.4);
background:rgba(255,255,255,0.25);
backdrop-filter:blur(10px);
padding:8px 12px;
font-family:cursive;
cursor:pointer;
transition:.3s;
}

button:hover,select:hover,input:hover{
background:rgba(255,255,255,0.4);
}

#content{
max-width:900px;
margin:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.box{
display:flex;
justify-content:space-between;
align-items:flex-start;
padding:16px;
border-radius:16px;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(12px);
cursor:pointer;
}

.boxLeft{
display:flex;
flex-direction:column;
flex:1;
}

.boxTitle{
font-size:20px;
font-weight:bold;
text-align:left;
}

.boxSnippet{
font-size:16px;
color:rgba(0,0,0,0.6);
font-style:italic;
line-height:1.3;
margin-top:4px;
text-align:left;
}

.boxButtons{
display:flex;
gap:6px;
}

.fullView h2{
font-size:28px;
}

.fullView p{
white-space:pre-line;
font-size:20px;
line-height:1.7;
}

.presentation p{
font-size:42px;
text-align:center;
line-height:1.8;
}

.form{
background:white;
padding:20px;
border-radius:16px;
display:flex;
flex-direction:column;
gap:10px;
}

textarea{
height:160px;
resize:vertical;
}

#search{
display:none;
}
</style>
</head>

<body>

<header>

<h1 onclick="location.reload()">Kirtan Lyrics</h1>

<select id="typeSelect">
<option value="">Type</option>
<option value="Kirtan">Kirtan</option>
<option value="Aarti">Aarti</option>
<option value="Mantras">Mantras</option>
<option value="Pooja">Pooja</option>
<option value="Songs/Ghazals">Songs/Ghazals</option>
</select>

<select id="subSelect" style="display:none"></select>

<button id="searchBtn">🔍</button>
<input id="search" placeholder="Search">

<button id="sortBtn">A→Z</button>
<button id="addBtn">+ Add</button>

<button id="exportBtn">Export</button>

<input type="file" id="importFile" style="display:none">
<button onclick="document.getElementById('importFile').click()">Import</button>

</header>

<div id="content"></div>

<script>

/* DATA */

const defaultData={
Kirtan:{
Ram:[],
Krishna:[
{title:"Bhajo Radhe Govinda",lyrics:"Bhajo Radhe Govinda\nRadhe Govinda Bhajo",likes:0}
],
Shiva:[
{title:"Shiv Shambho",lyrics:"Shiv Shambho\nShiv Shambho",likes:0}
]
},
Pooja:{},
Aarti:[],
Mantras:[],
"Songs/Ghazals":[]
};

let data=JSON.parse(localStorage.getItem("kirtanData"))||defaultData;

function saveData(){
localStorage.setItem("kirtanData",JSON.stringify(data));
}

const content=document.getElementById("content");
const search=document.getElementById("search");
const sortBtn=document.getElementById("sortBtn");

currentType = "Kirtan";
currentSub = "Krishna";
let sortAZ=true;


/* GET CURRENT ARRAY */

function getCurrentArray(){

  if(currentType === "Kirtan") {
    return data.Kirtan[currentSub] || [];
  }

  if(currentType === "Pooja") {
    return data.Pooja[currentSub] || [];
  }

  if(currentType === "Aarti") {
    return data.Aarti;
  }

  if(currentType === "Mantras") {
    return data.Mantras;
  }

  if(currentType === "Songs/Ghazals") {
    return data["Songs/Ghazals"];
  }

  return [];
}


/* RENDER BOXES */

function renderBoxes(arr){

content.innerHTML="";

let list=[...arr];

if(search.value){
list=list.filter(x=>
x.title.toLowerCase().includes(search.value.toLowerCase())
);
}

list.sort((a,b)=>
sortAZ
? a.title.localeCompare(b.title)
: b.title.localeCompare(a.title)
);

list.forEach(item=>{

const box=document.createElement("div");
box.className="box";

const leftDiv=document.createElement("div");
leftDiv.className="boxLeft";

const titleDiv=document.createElement("div");
titleDiv.className="boxTitle";
titleDiv.textContent=item.title;

const snippet=document.createElement("div");
snippet.className="boxSnippet";
snippet.textContent=item.lyrics.split("\n").slice(0,2).join(" ");

leftDiv.appendChild(titleDiv);
leftDiv.appendChild(snippet);

const btnDiv=document.createElement("div");
btnDiv.className="boxButtons";

const likeBtn=document.createElement("button");
likeBtn.textContent=`♡${item.likes}`;

likeBtn.onclick=(e)=>{
e.stopPropagation();
item.likes++;
saveData();
renderBoxes(getCurrentArray());
};

const editBtn=document.createElement("button");
editBtn.textContent="✎";

editBtn.onclick=(e)=>{
e.stopPropagation();
editItem(item);
};

btnDiv.appendChild(likeBtn);
btnDiv.appendChild(editBtn);

box.appendChild(leftDiv);
box.appendChild(btnDiv);

box.onclick=()=>renderFull(item);

content.appendChild(box);

});

}


/* FULL VIEW */

function renderFull(item){

content.innerHTML=`
<div class="fullView">

<button onclick="goBack()">← Back</button>
<button onclick="presentationMode('${item.title}','${item.lyrics}')">🎤 Presentation</button>

<h2>${item.title}</h2>

<p>${item.lyrics}</p>

</div>
`;

}


/* PRESENTATION */

function presentationMode(title,lyrics){

content.innerHTML=`

<div class="presentation">

<button onclick="goBack()">← Exit</button>

<h2>${title}</h2>

<p>${lyrics}</p>

</div>

`;

}


/* BACK */

function goBack(){
renderBoxes(getCurrentArray());
}


/* EDIT */

function editItem(item){

content.innerHTML=`

<div class="form">

<input id="editTitle" value="${item.title}">

<textarea id="editLyrics">${item.lyrics}</textarea>

<button onclick="saveEdit('${item.title}')">Save</button>

<button onclick="goBack()">Cancel</button>

</div>

`;

window._editItem=item;

}


function saveEdit(title){

let arr=getCurrentArray();

const item=arr.find(x=>x.title===title)||window._editItem;

item.title=document.getElementById("editTitle").value;
item.lyrics=document.getElementById("editLyrics").value;

saveData();

goBack();

}


/* INITIAL LOAD */

renderBoxes(getCurrentArray());

</script>

</body>
</html>
