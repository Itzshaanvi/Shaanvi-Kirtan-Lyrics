<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirtan Lyrics</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:cursive;background:#f5f5f5}
header{display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center;padding:20px}

button,select,input{
border-radius:12px;
border:1px solid rgba(255,255,255,0.4);
background:rgba(255,255,255,0.25);
backdrop-filter:blur(10px);
padding:8px 12px;
font-family:cursive;
cursor:pointer;
}

#content{max-width:900px;margin:auto;padding:20px;display:flex;flex-direction:column;gap:12px}

.box{
display:flex;
justify-content:space-between;
padding:16px;
border-radius:16px;
background:rgba(255,255,255,0.35);
cursor:pointer
}

.boxLeft{display:flex;flex-direction:column}
.boxTitle{font-size:20px;font-weight:bold}
.boxSnippet{font-size:16px;color:rgba(0,0,0,0.6)}

textarea{height:150px}
.form{background:white;padding:20px;border-radius:16px;display:flex;flex-direction:column;gap:10px}

.presentation p{font-size:42px;text-align:center}
</style>
</head>

<body>

<header>

<h1 onclick="location.reload()">Kirtan Lyrics</h1>

<select id="typeSelect">
<option value="Kirtan">Kirtan</option>
<option value="Aarti">Aarti</option>
<option value="Mantras">Mantras</option>
<option value="Pooja">Pooja</option>
<option value="Songs/Ghazals">Songs/Ghazals</option>
</select>

<select id="subSelect"></select>

<button id="searchBtn">🔍</button>
<input id="search" placeholder="Search" style="display:none">

<button id="sortBtn">A→Z</button>
<button id="addBtn">+ Add</button>
<button id="exportBtn">Export</button>

<input type="file" id="importFile" style="display:none">
<button onclick="document.getElementById('importFile').click()">Import</button>

</header>

<div id="content"></div>

<script>

/* FIREBASE CONFIG */

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT_ID"
};

const app=firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* DATA */

let data={
Kirtan:{Krishna:[],Ram:[],Shiva:[]},
Aarti:[],
Mantras:[],
Pooja:{},
"Songs/Ghazals":[]
};

/* UI */

const content=document.getElementById("content");
const typeSelect=document.getElementById("typeSelect");
const subSelect=document.getElementById("subSelect");
const search=document.getElementById("search");
const sortBtn=document.getElementById("sortBtn");

let currentType="Kirtan";
let currentSub="Krishna";
let sortAZ=true;

/* SUB SELECT */

function loadSub(){

subSelect.innerHTML="";

if(currentType==="Kirtan"){

["Krishna","Ram","Shiva"].forEach(s=>{
let o=document.createElement("option");
o.value=s;
o.textContent=s;
subSelect.appendChild(o);
});

subSelect.style.display="inline";
subSelect.value=currentSub;

}else{

subSelect.style.display="none";

}

}

/* GET ARRAY */

function getArray(){

if(currentType==="Kirtan") return data.Kirtan[currentSub];

return data[currentType];

}

/* RENDER */

function render(){

let arr=[...getArray()];

content.innerHTML="";

if(search.value){

arr=arr.filter(x=>x.title.toLowerCase().includes(search.value.toLowerCase()))

}

arr.sort((a,b)=>sortAZ?a.title.localeCompare(b.title):b.title.localeCompare(a.title));

arr.forEach(item=>{

let box=document.createElement("div");
box.className="box";

box.innerHTML=`
<div class="boxLeft">
<div class="boxTitle">${item.title}</div>
<div class="boxSnippet">${item.lyrics.split("\n")[0]}</div>
</div>
<div>
<button onclick="like('${item.id}')">♡${item.likes}</button>
<button onclick="edit('${item.id}')">✎</button>
</div>
`;

box.onclick=()=>view(item);

content.appendChild(box);

});

}

/* FIREBASE LOAD */

async function load(){

const snap=await db.collection("kirtans").get();

snap.forEach(doc=>{
let k=doc.data();

if(k.type==="Kirtan"){
data.Kirtan[k.sub].push(k)
}else{
data[k.type].push(k)
}

});

render();

}

load();

/* LIKE */

async function like(id){

let ref=db.collection("kirtans").doc(id);

let d=await ref.get();

await ref.update({likes:d.data().likes+1});

location.reload();

}

/* VIEW */

function view(item){

content.innerHTML=`
<button onclick="render()">← Back</button>
<button onclick="presentation('${item.title}','${item.lyrics}')">🎤</button>
<h2>${item.title}</h2>
<p style="white-space:pre-line">${item.lyrics}</p>
`;

}

/* PRESENTATION */

function presentation(title,lyrics){

content.innerHTML=`
<button onclick="render()">Exit</button>
<h2>${title}</h2>
<p class="presentation">${lyrics}</p>
`;

}

/* ADD */

document.getElementById("addBtn").onclick=function(){

content.innerHTML=`

<div class="form">

<input id="newTitle" placeholder="Title">

<textarea id="newLyrics" placeholder="Lyrics"></textarea>

<button onclick="save()">Save</button>

<button onclick="render()">Cancel</button>

</div>

`;

};

async function save(){

let title=document.getElementById("newTitle").value;
let lyrics=document.getElementById("newLyrics").value;

await db.collection("kirtans").add({

title,
lyrics,
likes:0,
type:currentType,
sub:currentSub

});

location.reload();

}

/* DROPDOWNS */

typeSelect.onchange=function(){

currentType=this.value;

loadSub();

render();

};

subSelect.onchange=function(){

currentSub=this.value;

render();

};

/* SEARCH */

document.getElementById("searchBtn").onclick=function(){

search.style.display=search.style.display==="none"?"inline":"none";

};

/* SORT */

sortBtn.onclick=function(){

sortAZ=!sortAZ;

render();

};

/* EXPORT */

document.getElementById("exportBtn").onclick=function(){

let file=new Blob([JSON.stringify(data)],{type:"application/json"});

let a=document.createElement("a");

a.href=URL.createObjectURL(file);

a.download="kirtans.json";

a.click();

};

/* IMPORT */

document.getElementById("importFile").onchange=function(e){

let reader=new FileReader();

reader.onload=function(){

data=JSON.parse(reader.result);

render();

};

reader.readAsText(e.target.files[0]);

};

/* INIT */

loadSub();
render();

</script>

</body>
</html>
